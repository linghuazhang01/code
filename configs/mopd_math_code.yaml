# Default two-domain MOPD/ExOPD setting from G-OPD (arXiv:2602.12125).
# This config expects the G-OPD verl fork or an equivalent verl checkout with
# policy_loss.multi_teacher_distill and extra_info.opd_teacher support.

runtime:
  python_bin: python3
  verl_module: verl.trainer.main_ppo
  wandb_mode: online
  used_model: no_api

data:
  train_files:
    - ../G-OPD-Training-Data/math_and_code/train.parquet
  val_files:
    - ../G-OPD-Training-Data/PaperEval/AIME24/test.parquet
    - ../G-OPD-Training-Data/PaperEval/AIME25/test.parquet
    - ../G-OPD-Training-Data/PaperEval/HMMT25Feb/test.parquet
    - ../G-OPD-Training-Data/PaperEval/HMMT25Nov/test.parquet
    - ../G-OPD-Training-Data/PaperEval/HumanEvalPlus/test.parquet
    - ../G-OPD-Training-Data/PaperEval/MBPPPlus/test.parquet
    - ../G-OPD-Training-Data/PaperEval/LiveCodeBench/test.parquet
  train_batch_size: 1024
  max_prompt_length: 2048
  max_response_length: 16384
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: false

model:
  student_path: Qwen/Qwen3-4B
  student_base_path: Qwen/Qwen3-4B
  math_teacher_path: Qwen3-4B-Non-Thinking-RL-Math
  code_teacher_path: Qwen3-4B-Non-Thinking-RL-Code

actor:
  learning_rate: "1e-5"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: true
  lambda_vals: 1.25
  multi_teacher_distill: true
  ppo_mini_batch_size: 1024
  ppo_micro_batch_size_per_gpu: 1
  use_kl_loss: true
  kl_loss_coef: 0
  kl_loss_type: low_var_kl
  entropy_coeff: 0
  ppo_max_token_len_per_gpu: 32768
  gradient_checkpointing: true
  param_offload: false
  optimizer_offload: false

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 4
  tensor_model_parallel_size: 4
  name: vllm
  gpu_memory_utilization: 0.6
  enable_chunked_prefill: false
  n: 1
  max_num_batched_tokens: 32768
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 1.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

audit:
  enabled: false
  output_dir: mopd_audit
  domains:
    - math
    - code
  tensorboard_prefix: mopd
  tensorboard_layout: domain_category
  tensorboard_prune_mode: none
  loss_variance_signal: opd_loss_token
  max_samples_per_domain: 32
  high_variance_cv_threshold: 1.0
  log_sample_level: true
  log_validation_metrics: true
  tier2_window_size: 20
  calibration_bins: 10
  validation_anchor_enabled: true
  validation_anchor_refresh_steps: 0
  full_gradient_validation_files:
    - ../G-OPD-Training-Data/PaperEval/AIME25/test.parquet
    - ../G-OPD-Training-Data/PaperEval/HumanEvalPlus/test.parquet
  full_gradient_validation_batch_size: 128

paper_eval:
  enabled: false
  script_path: scripts/run_paper_eval_suite.sh
  model_path: null
  output_dir: paper_eval
  datasets:
    - aime24
    - aime25
    - hmmt25_feb
    - hmmt25_nov
    - humaneval_plus
    - mbpp_plus
    - lcb
  run_on_initial_validation: true
  evaluate_current_checkpoint: true
  fail_on_error: false
  timeout_seconds: 0

trainer:
  project_name: on-policy-distillation
  experiment_name: Qwen3-4B-Non-Thinking-Multi-Teacher-Distill-ExOPD
  logger: '["console","wandb"]'
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 50
  default_local_dir: /G-OPD-checkpoints/Qwen3-4B-Non-Thinking-Multi-Teacher-Distill-ExOPD
  test_freq: 10
  total_epochs: 3
  max_actor_ckpt_to_keep: null
  max_critic_ckpt_to_keep: null
  critic_warmup: 0
  val_before_train: true
  log_val_generations: 10
