# Smoke test for separated Qwen3-30B teacher workers on a 2GPU host.
#
# GPU pool layout:
# - actor/rollout pool: 1 GPU for the Qwen3-4B student and vLLM
# - ref/teacher pool: 1 GPU for the Qwen3-30B teacher kept on GPU
#
# This tests whether the split teacher path can avoid CPU/offload memory OOM
# when the teacher is GPU-resident. It is not equivalent to the higher-throughput
# 2+2 GPU split config.

runtime:
  python_bin: python
  verl_module: verl.trainer.main_ppo
  wandb_mode: disabled
  wandb_entity: null
  env_file: .env.local
  used_model: no_api

data:
  domain_train_files:
    math:
      - data/G-OPD-Training-Data/DeepMath-103K/train_filtered_level6.parquet
    code:
      - data/G-OPD-Training-Data/Eurus/code_train.parquet
  domain_sampling_weights:
    math: 0.5
    code: 0.5
  domain_sampling_replacement: true
  val_files:
    - eval/domains/math/data/AIME24/test.parquet
    - eval/domains/code/data/HumanEvalPlus/test.parquet
  train_batch_size: 16
  max_prompt_length: 2048
  max_response_length: 512
  val_batch_size: 16
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: false

model:
  student_path: ../models/Qwen3-4B
  student_base_path: null
  math_teacher_path: ../models/Qwen3-30B-A3B
  code_teacher_path: ../models/Qwen3-30B-A3B
  teacher_model_device: gpu

actor:
  learning_rate: "5e-6"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: false
  lambda_vals: 1.0
  multi_teacher_distill: true
  distill_loss_builder: policy_gradient
  distill_mode: chosen_token_policy_gradient
  topk_distill_enabled: false
  topk_distill_kl_direction: reverse
  topk_distill_k: 32
  topk_distill_support_source: teacher
  topk_distill_tail_bucket: false
  topk_distill_temperature: 1.0
  topk_distill_loss_weight: 0.0
  topk_distill_logprob_chunk_size: 16
  topk_distill_logprob_mode: sparse
  ppo_mini_batch_size: 16
  ppo_micro_batch_size_per_gpu: 1
  use_kl_loss: true
  kl_loss_coef: 0
  kl_loss_type: low_var_kl
  entropy_coeff: 0
  ppo_max_token_len_per_gpu: 4096
  gradient_checkpointing: true
  param_offload: true
  optimizer_offload: true
  fsdp_size: 1
  use_dynamic_bsz: false

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 1
  tensor_model_parallel_size: 1
  name: vllm
  mode: sync
  gpu_memory_utilization: 0.45
  enforce_eager: true
  enable_chunked_prefill: false
  n: 1
  max_num_batched_tokens: 4096
  max_model_len: 3072
  max_num_seqs: 16
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 1.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

worker_placement:
  separate_ref_policy: true
  actor_rollout:
    n_gpus_per_node: 1
    nnodes: 1
  ref_policy:
    n_gpus_per_node: 1
    nnodes: 1

audit:
  enabled: false
  output_dir: audit/qwen30b_pg_split_teacher_gpu_2gpu_b16_2step_smoke
  domains:
    - math
    - code
  log_sample_level: false
  log_validation_metrics: false
  full_gradient_enabled: false
  full_gradient_direct_recompute_enabled: false
  token_gap_enabled: false
  entropy_enabled: false
  token_conflict_enabled: false

paper_eval:
  enabled: false
  script_path: eval/scripts/run_paper_eval_suite.sh
  model_path: null
  output_dir: eval_outputs/paper_suite/qwen30b_pg_split_teacher_gpu_2gpu_b16_2step_smoke
  datasets:
    - aime24
    - humaneval_plus
  run_on_initial_validation: false
  evaluate_current_checkpoint: false
  fail_on_error: false
  timeout_seconds: 0

trainer:
  project_name: MOPD
  experiment_name: Qwen3-4B-from-Qwen3-30B-A3B-pg-split-teacher-gpu-2gpu-b16-2step-smoke
  logger: '["console","tensorboard"]'
  n_gpus_per_node: 1
  nnodes: 1
  save_freq: -1
  test_freq: -1
  total_epochs: 1
  total_training_steps: 2
  default_local_dir: checkpoints/MOPD/Qwen3-4B-from-Qwen3-30B-A3B-pg-split-teacher-gpu-2gpu-b16-2step-smoke
  critic_warmup: 0
  val_before_train: false
  log_val_generations: 0
  max_actor_ckpt_to_keep: 1
  max_critic_ckpt_to_keep: 1

ray_kwargs:
  ray_init:
    include_dashboard: false
    num_cpus: 32
