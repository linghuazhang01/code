# Formal math+code MOPD/ExOPD profile for eight NVIDIA A800 80GB GPUs.
# Loss-only token-gradient audit profile: every MOPD audit family is on, but
# token-gradient candidate selection only uses per-token loss magnitude.
# Use configs/mopd_formal_audit_all_8gpu.yaml for signed-gap and gap-abs selections too.

runtime:
  python_bin: python
  verl_module: verl.trainer.main_ppo
  wandb_mode: disabled
  used_model: no_api

data:
  domain_train_files:
    math:
      - data/G-OPD-Training-Data/DeepMath-103K/train_filtered_level6.parquet
    code:
      - data/G-OPD-Training-Data/Eurus/code_train.parquet
  domain_sampling_weights:
    math: 0.5
    code: 0.5
  domain_sampling_replacement: true
  val_files:
    - eval/domains/math/data/AIME24/test.parquet
    - eval/domains/math/data/AIME25/test.parquet
    - eval/domains/math/data/HMMT25Feb/test.parquet
    - eval/domains/math/data/HMMT25Nov/test.parquet
    - eval/domains/code/data/HumanEvalPlus/test.parquet
    - eval/domains/code/data/MBPPPlus/test.parquet
    # - eval/domains/code/data/LiveCodeBench/test.parquet
  train_batch_size: 1024
  max_prompt_length: 2048
  max_response_length: 16384
  val_batch_size: 1024
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: false

model:
  student_path: ../models/Qwen3-4B
  student_base_path: null
  math_teacher_path: ../models/Qwen3-4B-Non-Thinking-RL-Math-Step500
  code_teacher_path: ../models/Qwen3-4B-Non-Thinking-RL-Code-Step300

actor:
  learning_rate: "1e-5"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: true
  lambda_vals: 1.0
  multi_teacher_distill: true
  distill_mode: chosen_token_reverse_kl
  topk_distill_enabled: true
  topk_distill_kl_direction: reverse
  topk_distill_k: 5
  topk_distill_support_source: teacher
  topk_distill_tail_bucket: false
  topk_distill_temperature: 1.0
  topk_distill_loss_weight: 1.0
  topk_distill_logprob_chunk_size: 16
  topk_distill_logprob_mode: sparse
  ppo_mini_batch_size: 1024
  ppo_micro_batch_size_per_gpu: 1
  use_kl_loss: true
  kl_loss_coef: 0
  kl_loss_type: low_var_kl
  entropy_coeff: 0
  ppo_max_token_len_per_gpu: 32768
  gradient_checkpointing: true
  param_offload: false
  optimizer_offload: false
  fsdp_size: 1
  use_dynamic_bsz: true

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 1
  tensor_model_parallel_size: 4
  name: vllm
  gpu_memory_utilization: 0.6
  enforce_eager: true
  enable_chunked_prefill: false
  n: 1
  max_num_batched_tokens: 32768
  max_num_seqs: 16
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 1.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

audit:
  enabled: true
  output_dir: audit/formal_audit_loss_only_8gpu
  domains:
    - math
    - code
  tensorboard_prefix: mopd
  tensorboard_layout: domain_category
  tensorboard_prune_mode: core
  loss_variance_signal: opd_loss_token
  max_samples_per_domain: 16
  high_variance_cv_threshold: 1.0
  log_sample_level: true
  log_sample_level_freq_steps: 1
  log_validation_metrics: true
  log_validation_metrics_freq_steps: 1
  tier2_window_size: 20
  calibration_bins: 10
  full_gradient_enabled: true
  full_gradient_freq_steps: 1
  full_gradient_train_max_samples_per_domain: null
  full_gradient_micro_batch_size_per_gpu: 1
  full_gradient_storage_dtype: bfloat16
  sample_gradient_enabled: true
  sample_gradient_freq_steps: 1
  sample_gradient_norm_enabled: true
  sample_gradient_cos_enabled: true
  sample_gradient_cos_freq_steps: 1
  sample_gradient_log_sample_level: true
  sample_gradient_log_sample_level_freq_steps: 1
  token_gap_enabled: true
  token_gap_freq_steps: 1
  token_gap_vocab_vector_enabled: true
  token_gap_vocab_vector_freq_steps: 1
  token_gap_vocab_size: null
  entropy_enabled: true
  entropy_freq_steps: 1
  entropy_vocab_vector_enabled: true
  entropy_vocab_vector_freq_steps: 1
  token_conflict_enabled: true
  token_conflict_freq_steps: 1
  token_conflict_top_k: 50
  token_gradient_enabled: true
  token_gradient_freq_steps: 1
  token_gradient_gap_selection_enabled: false
  token_gradient_gap_abs_selection_enabled: false
  token_gradient_loss_abs_selection_enabled: true
  token_gradient_top_k: 100
  token_gradient_top_p: 0.10
  token_gradient_strict_grad_restore: false

paper_eval:
  enabled: false
  script_path: eval/scripts/run_paper_eval_suite.sh
  model_path: null
  output_dir: eval_outputs/paper_suite/formal_audit_loss_only_8gpu
  datasets:
    - aime24
    - aime25
    - hmmt25_feb
    - hmmt25_nov
    - humaneval_plus
    - mbpp_plus
    - lcb
  run_on_initial_validation: true
  evaluate_current_checkpoint: true
  fail_on_error: false
  timeout_seconds: 0

trainer:
  project_name: on-policy-distillation
  experiment_name: Qwen3-4B-Multi-Teacher-ExOPD-formal-audit-loss-only-8gpu
  logger: '["console","tensorboard"]'
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: -1
  default_local_dir: checkpoints/formal_audit_loss_only_8gpu
  test_freq: -1
  total_epochs: 3
  total_training_steps: 10
  max_actor_ckpt_to_keep: 2
  max_critic_ckpt_to_keep: 1
  critic_warmup: 0
  val_before_train: false
  log_val_generations: 10

ray_kwargs:
  ray_init:
    include_dashboard: false
    num_cpus: 32
