# Eight-GPU math+code+science Top-32 training profile for Qwen3-4B student distillation from
# Qwen3-30B-A3B-Instruct-2507.
#
# Physical GPU layout:
# - actor/rollout pool: 6 GPUs for Qwen3-4B student + vLLM
# - ref/teacher pool: 2 GPUs for Qwen3-30B-A3B-Instruct-2507
#
# Keep trainer.n_gpus_per_node equal to the actor/rollout pool size, because
# verl uses trainer.* as the actor DP world size. Launch with all eight GPUs, e.g.
# GPU_IDS=0,1,2,3,4,5,6,7.
#
# Enabled audit families:
# - math/code/science full gradient audit
# - token-gap/logp vectors, including full-vocab token-id vectors
# - student-entropy full-vocab vectors
#
# Disabled audit families:
# - token gradients
# - sample gradients
# - entropy distribution/scalars and token-conflict diagnostics

runtime:
  python_bin: python
  verl_module: verl.trainer.main_ppo
  wandb_mode: online
  wandb_entity: null
  env_file: .env.local
  used_model: no_api

data:
  domain_train_files:
    math:
      - data/G-OPD-Training-Data/DeepMath-103K/train_filtered_level6.parquet
    code:
      - data/G-OPD-Training-Data/Eurus/code_train.parquet
    science:
      - data/G-OPD-Training-Data/Science/train.parquet
  domain_sampling_weights:
    math: 1
    code: 1
    science: 1
  domain_sampling_replacement: true
  load_parquet_direct: true
  val_files:
    - data/eval_data/math/AIME24/test.parquet
    - data/eval_data/math/AIME25/test.parquet
    - data/eval_data/math/HMMT25Feb/test.parquet
    - data/eval_data/math/HMMT25Nov/test.parquet
    - data/eval_data/code/HumanEvalPlus/test.parquet
    - data/eval_data/code/MBPPPlus/test.parquet
    # Prepare with scripts/prepare_m2rl_eval_data.sh.
    - data/eval_data/science/GPQA/test.parquet
    # - data/eval_data/code/LiveCodeBench/test.parquet
  # 504 = 6 actor GPUs x 3 domains x 28 samples.
  train_batch_size: 504
  max_prompt_length: 2048
  max_response_length: 16384
  val_batch_size: 1024
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: false

model:
  student_path: ../models/Qwen3-4B
  student_base_path: null
  math_teacher_path: ../models/Qwen3-30B-A3B-Instruct-2507
  code_teacher_path: ../models/Qwen3-30B-A3B-Instruct-2507
  domain_teacher_paths:
    math: ../models/Qwen3-30B-A3B-Instruct-2507
    code: ../models/Qwen3-30B-A3B-Instruct-2507
    science: ../models/Qwen3-30B-A3B-Instruct-2507
  teacher_model_device: gpu
  attn_implementation: flash_attention_2

actor:
  learning_rate: "5e-6"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: false
  lambda_vals: 1.0
  multi_teacher_distill: true
  distill_loss_builder: topk_kl
  distill_mode: topk_renormalized_reverse_kl
  topk_distill_enabled: true
  topk_distill_kl_direction: reverse
  topk_distill_k: 32
  topk_distill_support_source: teacher
  topk_distill_tail_bucket: false
  topk_distill_temperature: 1.0
  topk_distill_loss_weight: 1.0
  topk_distill_logprob_chunk_size: 16
  topk_distill_logprob_mode: sparse
  ppo_mini_batch_size: 504
  ppo_micro_batch_size_per_gpu: 1
  use_kl_loss: true
  kl_loss_coef: 0
  kl_loss_type: low_var_kl
  entropy_coeff: 0
  ppo_max_token_len_per_gpu: 32768
  gradient_checkpointing: true
  param_offload: true
  optimizer_offload: true
  fsdp_size: 1
  use_dynamic_bsz: false

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 1
  tensor_model_parallel_size: 2
  name: vllm
  mode: sync
  gpu_memory_utilization: 0.6
  enforce_eager: true
  enable_chunked_prefill: false
  n: 1
  max_num_batched_tokens: 32768
  max_model_len: 18432
  max_num_seqs: 24
  do_sample: true
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 0.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

extra_overrides:
  - custom_reward_function.path=mopd_verl/mixed_reward.py
  - custom_reward_function.name=compute_score

worker_placement:
  separate_ref_policy: true
  actor_rollout:
    n_gpus_per_node: 6
    nnodes: 1
  ref_policy:
    n_gpus_per_node: 2
    nnodes: 1

audit:
  enabled: true
  output_dir: audit/qwen4b_30b_a3b_instruct_2507_math_code_science_topk32
  domains:
    - math
    - code
    - science
  tensorboard_prefix: mopd
  tensorboard_layout: domain_category
  tensorboard_prune_mode: core
  loss_variance_signal: opd_loss_token
  max_samples_per_domain: null
  high_variance_cv_threshold: 1.0
  log_sample_level: false
  log_sample_level_freq_steps: 1
  log_validation_metrics: false
  log_validation_metrics_freq_steps: 1
  tier2_window_size: 20
  calibration_bins: 10
  full_gradient_enabled: true
  full_gradient_freq_steps: 4
  full_grad_training_parity_freq_steps: 1
  full_grad_training_parity_rel_l2_threshold: 2.0e-2
  full_gradient_train_max_samples_per_domain: null
  full_gradient_micro_batch_size_per_gpu: 1
  full_gradient_storage_dtype: bfloat16
  execution_timing: pre_update
  full_gradient_direct_recompute_enabled: false
  sequence_masked_target_enabled: true
  sequence_masked_target_use_as_primary: true
  sequence_replay_skip_non_target_domains: false
  sequence_masked_target_closure_rel_l2_threshold: 0.02
  full_gradient_offload_domain_gradients: true
  sample_gradient_enabled: false
  sample_gradient_freq_steps: 1
  sample_gradient_norm_enabled: false
  sample_gradient_cos_enabled: false
  sample_gradient_cos_freq_steps: 1
  sample_gradient_backward_recompute_enabled: false
  sample_gradient_backward_sync_enabled: false
  sample_gradient_log_sample_level: false
  sample_gradient_log_sample_level_freq_steps: 1
  token_gap_enabled: true
  token_gap_freq_steps: 1
  token_gap_vocab_vector_enabled: true
  token_gap_vocab_vector_freq_steps: 1
  token_gap_vocab_size: null
  vocab_per_occurrence_mean_vector_enabled: true
  logp_vocab_per_occurrence_mean_vector_enabled: true
  logp_abs_vocab_per_occurrence_mean_vector_enabled: true
  entropy_vocab_per_occurrence_mean_vector_enabled: true
  entropy_enabled: false
  entropy_freq_steps: 1
  entropy_vocab_vector_enabled: true
  entropy_vocab_vector_freq_steps: 1
  topk_teacher_student_cross_entropy_vocab_enabled: true
  topk_teacher_student_cross_entropy_vocab_freq_steps: 1
  topk_teacher_student_cross_entropy_k: 32
  topk_teacher_student_cross_entropy_include_tail: false
  topk_teacher_student_cross_entropy_temperature: 1.0
  logp_vector_enabled: true
  logp_vector_freq_steps: 1
  logp_abs_vector_enabled: true
  logp_abs_vector_freq_steps: 1
  token_conflict_enabled: false
  token_conflict_freq_steps: 1
  token_conflict_top_k: null
  token_gradient_enabled: false
  token_gradient_freq_steps: 1
  token_gradient_gap_selection_enabled: false
  token_gradient_gap_abs_selection_enabled: false
  token_gradient_loss_abs_selection_enabled: false
  token_gradient_top_k: 50
  token_gradient_top_p: 1.0
  token_gradient_strict_grad_restore: false
  token_gradient_backward_recompute_enabled: false
  token_gradient_backward_sync_enabled: false
  gradient_fingerprint_enabled: false
  gradient_fingerprint_freq_steps: 1

paper_eval:
  enabled: false
  script_path: eval/scripts/run_paper_eval_suite.sh
  model_path: null
  output_dir: eval_outputs/paper_suite/qwen4b_30b_a3b_instruct_2507_math_code_science_topk32
  datasets:
    - aime24
    - aime25
    - hmmt25_feb
    - hmmt25_nov
    - humaneval_plus
    - mbpp_plus
    - lcb
  run_on_initial_validation: true
  evaluate_current_checkpoint: true
  fail_on_error: false
  timeout_seconds: 0

trainer:
  project_name: MOPD
  experiment_name: qwen4b-from-30b-a3b-instruct-2507-math-code-science-topk32
  logger: '["console","tensorboard","wandb"]'
  n_gpus_per_node: 6
  nnodes: 1
  save_freq: 5
  test_freq: -1
  total_epochs: 3
  total_training_steps: 200
  default_local_dir: checkpoints/MOPD/qwen4b-from-30b-a3b-instruct-2507-math-code-science-topk32
  critic_warmup: 0
  val_before_train: false
  log_val_generations: 10
  max_actor_ckpt_to_keep: 2
  max_critic_ckpt_to_keep: 1

ray_kwargs:
  ray_init:
    include_dashboard: false
    num_cpus: 24
