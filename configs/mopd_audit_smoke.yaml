# One-step audit smoke setting for a single A800/H100-style GPU.
# This enables TensorBoard and MOPD audit JSONL logging.

runtime:
  python_bin: python
  verl_module: verl.trainer.main_ppo
  wandb_mode: disabled
  used_model: no_api

data:
  train_files:
    - smoke_data/train.parquet
  domain_sampling_weights:
    math: 0.5
    code: 0.5
  val_files:
    - smoke_data/val.parquet
  train_batch_size: 1
  max_prompt_length: 256
  max_response_length: 16384
  filter_overlong_prompts: true
  truncation: error
  shuffle: false
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: false

model:
  student_path: Qwen/Qwen3-0.6B
  student_base_path: Qwen/Qwen3-0.6B
  math_teacher_path: Qwen/Qwen3-0.6B
  code_teacher_path: Qwen/Qwen3-0.6B

actor:
  learning_rate: "1e-6"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: true
  lambda_vals: 1.25
  multi_teacher_distill: true
  ppo_mini_batch_size: 1
  ppo_micro_batch_size_per_gpu: 1
  use_kl_loss: true
  kl_loss_coef: 0
  kl_loss_type: low_var_kl
  entropy_coeff: 0
  ppo_max_token_len_per_gpu: 512
  gradient_checkpointing: true
  param_offload: true
  optimizer_offload: true

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 1
  tensor_model_parallel_size: 1
  name: vllm
  gpu_memory_utilization: 0.35
  enable_chunked_prefill: false
  n: 1
  max_num_batched_tokens: 1024
  max_num_seqs: 1
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 1.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

audit:
  enabled: true
  output_dir: audit/smoke
  domains:
    - math
    - code
  tensorboard_prefix: mopd
  tensorboard_layout: domain_category
  tensorboard_prune_mode: core
  loss_variance_signal: opd_loss_token
  max_samples_per_domain: 8
  high_variance_cv_threshold: 1.0
  log_sample_level: true
  log_validation_metrics: true
  tier2_window_size: 5
  calibration_bins: 5

trainer:
  project_name: on-policy-distillation
  experiment_name: mopd-audit-smoke
  logger: '["console","tensorboard"]'
  n_gpus_per_node: 1
  nnodes: 1
  save_freq: -1
  default_local_dir: checkpoints/audit_smoke
  test_freq: 1
  total_epochs: 1
  total_training_steps: 1
  critic_warmup: 0
  val_before_train: true
  log_val_generations: 0

ray_kwargs:
  ray_init:
    include_dashboard: false
    num_cpus: 8
