tools:
  - class_name: verl.tools.search_tool.SearchTool
    config:
      retrieval_service_url: http://127.0.0.1:8000/retrieve
      num_workers: 120
      rate_limit: 120
      timeout: 30
      topk: 5
      type: native
    tool_schema:
      type: function
      function:
        name: search
        description: Searches for relevant information based on the given queries.
        parameters:
          type: object
          properties:
            query_list:
              type: array
              items:
                type: string
              description: A list of fully formed search queries.
          required:
            - query_list
