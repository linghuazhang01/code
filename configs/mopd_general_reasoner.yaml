# General-Reasoner/WebInstruct MOPD setting.
# General-Reasoner-Qwen3-14B is a Qwen3-14B-Base reasoning RL model, not a
# Qwen3-Instruct non-thinking checkpoint. Keep enable_thinking=true here.

runtime:
  python_bin: python
  verl_module: verl.trainer.main_ppo
  wandb_mode: online
  used_model: no_api

data:
  domain_train_files:
    reasoning:
      - data/GeneralReasoner/WebInstructVerified/train.parquet
  domain_sampling_weights:
    reasoning: 1.0
  domain_sampling_replacement: true
  val_files:
    - eval/domains/greasoner/data/WebInstructVerified/test.parquet
  train_batch_size: 1024
  val_batch_size: 500
  max_prompt_length: 1024
  max_response_length: 16384
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: true
  need_tools_kwargs: false

model:
  student_path: ../models/Qwen3-4B
  student_base_path: ../models/Qwen3-4B
  reasoning_teacher_path: ../models/General-Reasoner-Qwen3-14B
  secondary_teacher_path: null

actor:
  learning_rate: "5e-7"
  lr_warmup_steps_ratio: 0.285
  only_reverse_kl_advantages: true
  lambda_vals: 1.25
  multi_teacher_distill: true
  ppo_mini_batch_size: 256
  ppo_micro_batch_size_per_gpu: 1
  use_kl_loss: true
  kl_loss_coef: 0
  kl_loss_type: low_var_kl
  entropy_coeff: 0
  ppo_max_token_len_per_gpu: 32768
  gradient_checkpointing: true
  param_offload: false
  optimizer_offload: false

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 4
  tensor_model_parallel_size: 4
  name: sglang
  mode: sync
  gpu_memory_utilization: 0.6
  enable_chunked_prefill: false
  n: 1
  max_model_len: 17408
  max_num_batched_tokens: 32768
  max_num_seqs: 1024
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 1.0
  val_top_p: 1.0
  seed: 42
  multi_turn_enable: false

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

audit:
  enabled: false
  output_dir: mopd_audit_general_reasoner
  domains:
    - reasoning
  tensorboard_prefix: mopd
  tensorboard_layout: domain_category
  tensorboard_prune_mode: core
  loss_variance_signal: opd_loss_token
  max_samples_per_domain: 32
  high_variance_cv_threshold: 1.0
  log_sample_level: true
  log_validation_metrics: true
  tier2_window_size: 20
  calibration_bins: 10

paper_eval:
  enabled: false
  script_path: null
  model_path: null
  output_dir: paper_eval_general_reasoner
  datasets: []

trainer:
  project_name: on-policy-distillation
  experiment_name: Qwen3-4B-GeneralReasoner-Qwen3-14B-MOPD
  logger: '["console","wandb"]'
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 100
  default_local_dir: checkpoints/Qwen3-4B-GeneralReasoner-Qwen3-14B-MOPD
  test_freq: 50
  total_epochs: 1
  total_training_steps: null
  max_actor_ckpt_to_keep: null
  max_critic_ckpt_to_keep: null
  critic_warmup: 0
  val_before_train: false
  log_val_generations: 10
