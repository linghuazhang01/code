# Two-GPU correctness profile for replicated FSDP1 accumulation and audit parity.

runtime:
  python_bin: python
  verl_module: verl.trainer.main_ppo
  wandb_mode: disabled
  wandb_entity: null
  env_file: .env.local
  used_model: no_api

data:
  domain_train_files:
    math:
      - data/G-OPD-Training-Data/DeepMath-103K/train_filtered_level6.parquet
    code:
      - data/G-OPD-Training-Data/Eurus/code_train.parquet
  domain_sampling_weights:
    math: 1
    code: 1
  val_files:
    - data/eval_data/math/AIME24/test.parquet
  train_batch_size: 16
  max_prompt_length: 512
  max_response_length: 128
  shuffle: false
  validation_shuffle: false
  seed: 42
  enable_thinking: false

model:
  student_path: ../models/Qwen3-4B
  student_base_path: null
  math_teacher_path: ../models/Qwen3-0.6B
  code_teacher_path: ../models/Qwen3-0.6B
  teacher_model_device: cpu

actor:
  learning_rate: "5e-6"
  ppo_mini_batch_size: 16
  ppo_micro_batch_size_per_gpu: 1
  ppo_max_token_len_per_gpu: 1024
  use_dynamic_bsz: false
  gradient_checkpointing: true
  param_offload: false
  optimizer_offload: false
  fsdp_size: 1

rollout:
  name: hf
  tensor_model_parallel_size: 1
  log_prob_micro_batch_size_per_gpu: 1
  n: 1
  max_num_batched_tokens: 1024
  max_model_len: 768
  max_num_seqs: 16
  temperature: 1.0
  top_p: 1.0
  seed: 42

worker_placement:
  separate_ref_policy: false
  actor_rollout:
    n_gpus_per_node: 2
    nnodes: 1

audit:
  enabled: true
  output_dir: audit/fsdp_accumulation_parity_2gpu_b16_2step
  domains:
    - math
    - code
  full_gradient_enabled: true
  full_gradient_freq_steps: 1
  full_grad_training_parity_freq_steps: 1
  full_grad_training_parity_rel_l2_threshold: 1.0e-5
  full_gradient_micro_batch_size_per_gpu: 1
  full_gradient_storage_dtype: bfloat16
  execution_timing: pre_update
  full_gradient_direct_recompute_enabled: false
  sequence_masked_target_enabled: true
  sequence_masked_target_use_as_primary: true
  sequence_replay_skip_non_target_domains: false
  sequence_masked_target_closure_rel_l2_threshold: 0.02
  sample_gradient_enabled: false
  token_gradient_enabled: false

trainer:
  project_name: MOPD
  experiment_name: fsdp-accumulation-parity-2gpu-b16-2step
  logger: '["console","tensorboard"]'
  n_gpus_per_node: 2
  nnodes: 1
  save_freq: -1
  test_freq: -1
  total_epochs: 1
  total_training_steps: 2
  default_local_dir: checkpoints/MOPD/fsdp-accumulation-parity-2gpu-b16-2step
  val_before_train: false

ray_kwargs:
  ray_init:
    include_dashboard: false
    num_cpus: 16
