name: mopd-verl

channels:
  - conda-forge

dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel
  - git
  - git-lfs
  - pip:
      # CUDA 12 / PyTorch 2.6 training runtime (Linux x86_64).
      - torch==2.6.0
      - torchvision==0.21.0
      - torchaudio==2.6.0
      - torchdata
      - tensordict==0.6.2
      - vllm==0.8.5.post1
      - https://github.com/Dao-AILab/flash-attention/releases/download/v2.7.4.post1/flash_attn-2.7.4.post1+cu12torch2.6cxx11abiFALSE-cp310-cp310-linux_x86_64.whl

      # verl and MOPD runtime dependencies.
      - transformers[hf_xet]==4.51.3
      - tokenizers>=0.21.1,<0.22
      - huggingface_hub>=0.30.0,<1.0
      - hf_xet
      - hf-transfer
      - accelerate
      - datasets
      - peft
      - numpy<2.0.0
      - pandas
      - pyarrow>=19.0.0
      - ray[default]
      - codetiming
      - hydra-core
      - pylatexenc
      - qwen-vl-utils
      - wandb
      - dill
      - pybind11
      - liger-kernel
      - mathruler
      - packaging>=20.0
      - fastapi[standard]>=0.115.0
      - uvicorn
      - pydantic>=2.9
      - grpcio>=1.62.1
      - optree>=0.13.0
      - nvidia-ml-py>=12.560.30
      - latex2sympy2_extended
      - math_verify

      # Project utilities, evaluation, and observability.
      - pyyaml
      - click
      - tensorboard==2.20.0
      - protobuf>=3.20.3,<5.0
      - opentelemetry-exporter-prometheus==0.47b0
      - modelscope
      - langdetect
      - nltk
      - immutabledict
      - emoji
      - syllapy
      - unicodedata2
      - opencv-python
      - pytest
      - ipykernel
      - py-spy
      - pyext
      - pre-commit
      - ruff

      # Pin Git dependencies to immutable revisions.
      - git+https://github.com/abukharin-nv/verifiable-instructions.git@f46a5ac87b1400a4f8973039844b6be9b56e3faf
