# Three-GPU smoke test for per-family occurrence-normalized vocab vectors.
# The filename is retained for compatibility; the executable contract is 2 steps.
#
# Physical placement:
# - 2 GPUs for actor/rollout (FSDP size 2)
# - 1 GPU for the shared Qwen3-8B teacher
#
# The legacy global mean-vector switch is intentionally disabled. The logp,
# logp_abs, and entropy overrides are enabled independently to test precedence.

runtime:
  python_bin: python
  verl_module: verl.trainer.main_ppo
  wandb_mode: disabled
  wandb_entity: null
  env_file: .env.local
  used_model: no_api

data:
  domain_train_files:
    math:
      - data/G-OPD-Training-Data/DeepMath-103K/train_filtered_level6.parquet
    code:
      - data/G-OPD-Training-Data/Eurus/code_train.parquet
  domain_sampling_weights:
    math: 1
    code: 1
  domain_sampling_replacement: true
  load_parquet_direct: true
  val_files:
    - data/eval_data/math/AIME24/test.parquet
    - data/eval_data/code/HumanEvalPlus/test.parquet
  train_batch_size: 16
  val_batch_size: 16
  max_prompt_length: 2048
  max_response_length: 512
  filter_overlong_prompts: true
  truncation: error
  shuffle: false
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: false

model:
  student_path: /root/autodl-tmp/models/Qwen3-4B
  student_base_path: null
  math_teacher_path: /root/autodl-tmp/models/Qwen3-8B
  code_teacher_path: /root/autodl-tmp/models/Qwen3-8B
  domain_teacher_paths:
    math: /root/autodl-tmp/models/Qwen3-8B
    code: /root/autodl-tmp/models/Qwen3-8B
  teacher_model_device: gpu

actor:
  learning_rate: "5e-6"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: false
  lambda_vals: 1.0
  multi_teacher_distill: true
  distill_loss_builder: policy_gradient
  distill_mode: chosen_token_policy_gradient
  topk_distill_enabled: false
  topk_distill_kl_direction: reverse
  topk_distill_k: 32
  topk_distill_support_source: teacher
  topk_distill_tail_bucket: false
  topk_distill_temperature: 1.0
  topk_distill_loss_weight: 0.0
  topk_distill_logprob_chunk_size: 16
  topk_distill_logprob_mode: sparse
  ppo_mini_batch_size: 16
  ppo_micro_batch_size_per_gpu: 1
  use_dynamic_bsz: false
  use_kl_loss: true
  kl_loss_coef: 0
  kl_loss_type: low_var_kl
  entropy_coeff: 0
  ppo_max_token_len_per_gpu: 4096
  gradient_checkpointing: true
  param_offload: true
  optimizer_offload: true
  fsdp_size: 2

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 1
  tensor_model_parallel_size: 1
  name: vllm
  mode: sync
  gpu_memory_utilization: 0.45
  enforce_eager: true
  enable_chunked_prefill: false
  n: 1
  max_num_batched_tokens: 4096
  max_model_len: 3072
  max_num_seqs: 16
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 0.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

extra_overrides:
  - actor_rollout_ref.model.use_remove_padding=False
  - custom_reward_function.path=mopd_verl/mixed_reward.py
  - custom_reward_function.name=compute_score
  - trainer.resume_mode=disable

worker_placement:
  separate_ref_policy: true
  actor_rollout:
    n_gpus_per_node: 2
    nnodes: 1
  ref_policy:
    n_gpus_per_node: 1
    nnodes: 1

audit:
  enabled: true
  output_dir: audit/mopd-qwen4b-8b-3gpu-occurrence-vectors-b16-1step-smoke
  domains:
    - math
    - code
  tensorboard_prefix: mopd
  tensorboard_layout: domain_category
  tensorboard_prune_mode: core
  loss_variance_signal: opd_loss_token
  max_samples_per_domain: null
  high_variance_cv_threshold: 1.0
  log_sample_level: false
  log_sample_level_freq_steps: 1
  log_validation_metrics: false
  log_validation_metrics_freq_steps: 1
  tier2_window_size: 20
  calibration_bins: 10
  full_gradient_enabled: true
  full_gradient_freq_steps: 1
  full_grad_training_parity_freq_steps: 1
  full_grad_training_parity_rel_l2_threshold: 2.0e-2
  full_gradient_train_max_samples_per_domain: null
  full_gradient_micro_batch_size_per_gpu: 1
  full_gradient_storage_dtype: bfloat16
  execution_timing: pre_update
  full_gradient_direct_recompute_enabled: false
  sequence_masked_target_enabled: true
  sequence_masked_target_use_as_primary: true
  sequence_replay_skip_non_target_domains: false
  sequence_masked_target_closure_rel_l2_threshold: 0.02
  full_gradient_offload_domain_gradients: true
  sample_gradient_enabled: false
  sample_gradient_freq_steps: 1
  sample_gradient_norm_enabled: false
  sample_gradient_cos_enabled: false
  sample_gradient_cos_freq_steps: 1
  sample_gradient_backward_recompute_enabled: false
  sample_gradient_backward_sync_enabled: false
  sample_gradient_log_sample_level: false
  sample_gradient_log_sample_level_freq_steps: 1
  token_gap_enabled: true
  token_gap_freq_steps: 1
  token_gap_vocab_vector_enabled: true
  token_gap_vocab_vector_freq_steps: 1
  token_gap_vocab_size: null
  vocab_per_occurrence_mean_vector_enabled: false
  logp_vocab_per_occurrence_mean_vector_enabled: true
  logp_abs_vocab_per_occurrence_mean_vector_enabled: true
  entropy_vocab_per_occurrence_mean_vector_enabled: true
  entropy_enabled: false
  entropy_freq_steps: 1
  entropy_vocab_vector_enabled: true
  entropy_vocab_vector_freq_steps: 1
  topk_teacher_student_cross_entropy_vocab_enabled: false
  topk_teacher_student_cross_entropy_vocab_freq_steps: 1
  topk_teacher_student_cross_entropy_k: 32
  topk_teacher_student_cross_entropy_include_tail: false
  topk_teacher_student_cross_entropy_temperature: 1.0
  logp_vector_enabled: true
  logp_vector_freq_steps: 1
  logp_abs_vector_enabled: true
  logp_abs_vector_freq_steps: 1
  token_conflict_enabled: false
  token_conflict_freq_steps: 1
  token_conflict_top_k: null
  token_gradient_enabled: false
  token_gradient_freq_steps: 1
  token_gradient_gap_selection_enabled: false
  token_gradient_gap_abs_selection_enabled: false
  token_gradient_loss_abs_selection_enabled: false
  token_gradient_top_k: 50
  token_gradient_top_p: 1.0
  token_gradient_strict_grad_restore: false
  token_gradient_backward_recompute_enabled: false
  token_gradient_backward_sync_enabled: false
  gradient_fingerprint_enabled: false
  gradient_fingerprint_freq_steps: 1

trainer:
  project_name: MOPD
  experiment_name: mopd-qwen4b-8b-3gpu-occurrence-vectors-b16-1step-smoke
  logger: '["console","tensorboard"]'
  n_gpus_per_node: 2
  nnodes: 1
  save_freq: -1
  test_freq: -1
  total_epochs: 1
  total_training_steps: 2
  default_local_dir: checkpoints/MOPD/mopd-qwen4b-8b-3gpu-occurrence-vectors-b16-1step-smoke
  critic_warmup: 0
  val_before_train: false
  log_val_generations: 0
  max_actor_ckpt_to_keep: 1
  max_critic_ckpt_to_keep: 1

ray_kwargs:
  ray_init:
    include_dashboard: false
    num_cpus: 32
