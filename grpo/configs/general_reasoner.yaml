# General-Reasoner GRPO teacher training.

runtime:
  python_bin: python
  verl_module: verl.trainer.main_ppo
  wandb_mode: online
  used_model: no_api

data:
  train_files:
    - data/GeneralReasoner/WebInstructVerified/train.parquet
  domain_sampling_weights:
    reasoning: 1.0
  val_files:
    - eval/domains/greasoner/data/WebInstructVerified/test.parquet
  train_batch_size: 1024
  val_batch_size: 500
  max_prompt_length: 1024
  max_response_length: 8192
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: true

model:
  student_path: Qwen/Qwen3-4B
  student_base_path: Qwen/Qwen3-4B
  primary_teacher_path: Qwen/Qwen3-4B
  secondary_teacher_path: Qwen/Qwen3-4B

actor:
  learning_rate: "5e-7"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: false
  lambda_vals: 1.0
  multi_teacher_distill: false
  ppo_mini_batch_size: 256
  ppo_micro_batch_size_per_gpu: 8
  use_kl_loss: true
  kl_loss_coef: 0.0001
  kl_loss_type: low_var_kl
  entropy_coeff: 0.001
  ppo_max_token_len_per_gpu: 32768
  gradient_checkpointing: true
  param_offload: false
  optimizer_offload: false

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 160
  tensor_model_parallel_size: 2
  name: vllm
  mode: sync
  gpu_memory_utilization: 0.6
  enforce_eager: false
  enable_chunked_prefill: false
  n: 8
  max_num_batched_tokens: 9216
  max_num_seqs: 1024
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 1.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

trainer:
  project_name: grpo-teachers
  experiment_name: general-reasoner-qwen3-4b-grpo
  logger: '["console","wandb"]'
  n_gpus_per_node: 8
  nnodes: 1
  save_freq: 20
  default_local_dir: checkpoints/general-reasoner-qwen3-4b-grpo
  test_freq: 5
  total_epochs: 30
  total_training_steps: null
  critic_warmup: 0
  val_before_train: true
  log_val_generations: 10

extra_overrides:
  - custom_reward_function.path=grpo/rewards/general_reasoner.py
  - custom_reward_function.name=compute_score
  - reward_model.enable=True
  - reward_model.strategy=verifier
  - reward_model.reward_manager=naive
  - reward_model.micro_batch_size=0
  - reward_model.model.path=TIGER-Lab/general-verifier
  - +reward_model.worker.path=grpo/workers/general_verifier.py
  - +reward_model.worker.name=RewardModelWorker
  - +reward_model.gpu_memory_utilization=0.5
  - algorithm.kl_ctrl.kl_coef=0.001
  - actor_rollout_ref.actor.clip_ratio=0.3
  - actor_rollout_ref.actor.clip_ratio_c=10
