# ToolRL/RLLA GRPO teacher training.

runtime:
  python_bin: python
  verl_module: verl.trainer.main_ppo
  wandb_mode: online
  used_model: no_api

data:
  train_files:
    - data/ToolRL/rlla_4k/train.parquet
  domain_sampling_weights:
    tool: 1.0
  val_files:
    - data/ToolRL/rlla_4k/test.parquet
  train_batch_size: 512
  val_batch_size: 128
  max_prompt_length: 2048
  max_response_length: 1024
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  validation_shuffle: false
  seed: 42
  return_raw_chat: true
  enable_thinking: false

model:
  student_path: Qwen/Qwen2.5-3B-Instruct
  student_base_path: Qwen/Qwen2.5-3B-Instruct
  primary_teacher_path: Qwen/Qwen2.5-3B-Instruct
  secondary_teacher_path: Qwen/Qwen2.5-3B-Instruct

actor:
  learning_rate: "1e-6"
  lr_warmup_steps_ratio: 0.0
  only_reverse_kl_advantages: false
  lambda_vals: 1.0
  multi_teacher_distill: false
  ppo_mini_batch_size: 128
  ppo_micro_batch_size_per_gpu: 1
  use_kl_loss: false
  kl_loss_coef: 0.001
  kl_loss_type: low_var_kl
  entropy_coeff: 0
  ppo_max_token_len_per_gpu: 8192
  gradient_checkpointing: true
  param_offload: false
  optimizer_offload: false

rollout:
  calculate_log_probs: true
  log_prob_micro_batch_size_per_gpu: 1
  tensor_model_parallel_size: 1
  name: vllm
  mode: sync
  gpu_memory_utilization: 0.6
  enable_chunked_prefill: false
  n: 4
  max_num_batched_tokens: 4096
  max_num_seqs: 512
  temperature: 1.0
  top_p: 1.0
  val_n: 1
  val_do_sample: false
  val_temperature: 1.0
  val_top_p: 1.0
  seed: 42

rollout_correction:
  rollout_is: token
  rollout_is_threshold: 5.0
  rollout_rs: null
  bypass_mode: false

trainer:
  project_name: grpo-teachers
  experiment_name: toolrl-qwen2.5-3b-grpo
  logger: '["console","wandb"]'
  n_gpus_per_node: 2
  nnodes: 1
  save_freq: 15
  default_local_dir: checkpoints/toolrl-qwen2.5-3b-grpo
  test_freq: 5
  total_epochs: 15
  total_training_steps: null
  critic_warmup: 0
  val_before_train: true
  log_val_generations: 10

extra_overrides:
  - custom_reward_function.path=grpo/rewards/toolrl.py
  - custom_reward_function.name=compute_score
  - algorithm.kl_ctrl.kl_coef=0.001
  - actor_rollout_ref.actor.use_dynamic_bsz=True
  - actor_rollout_ref.actor.fsdp_config.grad_offload=False
